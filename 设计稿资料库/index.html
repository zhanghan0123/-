<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>涂覆包装设计稿资料库</title>
  <style>
    :root {
      --bg: #f4efe6;
      --panel: #fffaf2;
      --ink: #2e241c;
      --muted: #786a5d;
      --accent: #b14d1f;
      --accent-soft: #f3d9c8;
      --line: #e7d8c6;
      --shadow: 0 18px 40px rgba(76, 48, 27, 0.10);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, #fff6e6 0, #fff6e6 18%, transparent 19%),
        linear-gradient(135deg, #f8f0e4 0%, #f4efe6 45%, #efe7da 100%);
      color: var(--ink);
    }
    .page {
      max-width: 1440px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .hero {
      background: linear-gradient(135deg, rgba(177,77,31,0.95), rgba(229,153,89,0.88));
      color: white;
      border-radius: 28px;
      padding: 28px;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .hero h1 {
      margin: 0 0 10px;
      font-size: 32px;
    }
    .hero p {
      margin: 0;
      color: rgba(255,255,255,0.9);
      max-width: 880px;
      line-height: 1.6;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px;
      margin-top: 20px;
    }
    .stat {
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 18px;
      padding: 14px 16px;
      backdrop-filter: blur(10px);
    }
    .stat-value {
      font-size: 24px;
      font-weight: 700;
    }
    .stat-label {
      margin-top: 4px;
      font-size: 13px;
      color: rgba(255,255,255,0.85);
    }
    .toolbar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      padding: 22px;
      margin: 20px 0 26px;
      background: var(--panel);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }
    .toolbar label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .toolbar input,
    .toolbar select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: white;
      color: var(--ink);
      font-size: 14px;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
    }
    .card {
      background: rgba(255,250,242,0.92);
      border: 1px solid var(--line);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transform: translateY(18px);
      opacity: 0;
      animation: fadeUp 420ms ease forwards;
    }
    .thumb {
      display: block;
      aspect-ratio: 4 / 3;
      background: linear-gradient(135deg, #f6e9d8, #ead9c7);
      overflow: hidden;
    }
    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .body {
      padding: 16px;
    }
    .title {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.45;
      margin: 0 0 10px;
      word-break: break-word;
    }
    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    .badge {
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 12px;
      font-weight: 600;
    }
    .meta {
      display: grid;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
    }
    .meta strong {
      color: var(--ink);
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }
    .actions a {
      text-decoration: none;
      color: white;
      background: var(--accent);
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 13px;
    }
    .empty {
      display: none;
      margin-top: 18px;
      padding: 32px;
      border-radius: 20px;
      background: rgba(255,250,242,0.9);
      text-align: center;
      color: var(--muted);
      box-shadow: var(--shadow);
    }
    @keyframes fadeUp {
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
    @media (max-width: 640px) {
      .page { padding: 18px 14px 40px; }
      .hero { border-radius: 22px; padding: 22px; position: static; }
      .hero h1 { font-size: 24px; }
    }
  </style>
</head>

  <script>
    function main() {
      const raw = document.getElementById('design-data').textContent;
      const records = JSON.parse(raw);
      const cards = document.getElementById('cards');
      const empty = document.getElementById('empty');
      const filters = {
        search: document.getElementById('search'),
        packageType: document.getElementById('packageType'),
        channel: document.getElementById('channel'),
        status: document.getElementById('status'),
        date: document.getElementById('date'),
      };

      function matches(record) {
        const search = filters.search.value.trim().toLowerCase();
        const packageType = filters.packageType.value;
        const channel = filters.channel.value;
        const status = filters.status.value;
        const date = filters.date.value.trim();

        if (packageType && record["包装类型"] !== packageType) return false;
        if (channel && record["渠道"] !== channel) return false;
        if (status && record["状态"] !== status) return false;
        if (date && !String(record["日期"] || '').includes(date)) return false;
        if (!search) return true;

        const fields = [
          record.new_name,
          record["产品编码"],
          record["核心规格"],
          record["包装类型"],
          record["设计图号"],
          record["客户"],
          record["备注"],
          record.original_name,
        ].join(' ').toLowerCase();
        return fields.includes(search);
      }

      function badge(text) {
        return `<span class="badge">${text || '未填写'}</span>`;
      }

      function render() {
        const visible = records.filter(matches);
        cards.innerHTML = visible.map((record, index) => `
          <article class="card" style="animation-delay:${index * 20}ms">
            <a class="thumb" href="./${record.pdf_path}" target="_blank" rel="noreferrer">
              <img src="./${record.thumbnail_path}" alt="${record.new_name}">
            </a>
            <div class="body">
              <h2 class="title">${record.new_name}</h2>
              <div class="badges">
                ${badge(record["包装类型"])}
                ${badge(record["渠道"])}
                ${badge(record["状态"])}
              </div>
              <div class="meta">
                <div><strong>产品编码：</strong>${record["产品编码"] || ''}</div>
                <div><strong>核心规格：</strong>${record["核心规格"] || ''}</div>
                <div><strong>日期：</strong>${record["日期"] || ''}</div>
                <div><strong>版本：</strong>${record["版本"] || ''}</div>
                <div><strong>设计图号：</strong>${record["设计图号"] || ''}</div>
                <div><strong>客户：</strong>${record["客户"] || ''}</div>
                <div><strong>备注：</strong>${record["备注"] || ''}</div>
                <div><strong>原文件：</strong>${record.original_name}</div>
                <div><strong>重复组：</strong>${record.duplicate_group || '无'}</div>
              </div>
              <div class="actions">
                <a href="./${record.pdf_path}" target="_blank" rel="noreferrer">打开 PDF</a>
              </div>
            </div>
          </article>
        `).join('');
        empty.style.display = visible.length ? 'none' : 'block';
      }

      Object.values(filters).forEach((element) => {
        element.addEventListener('input', render);
        element.addEventListener('change', render);
      });

      render();
    }

    try {
      main();
    } catch (error) {
      const cards = document.getElementById('cards');
      cards.innerHTML = `<article class="card"><div class="body"><h2 class="title">数据加载失败</h2><div class="meta"><div>${error.message}</div></div></article>`;
    }
  </script>
